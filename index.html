<!-- Fonts: Fraunces (display serif) + Geist (body sans) + Geist Mono (figures) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --brand:       #F58921;
    --brand-dark:  #D97516;
    --brand-tint:  #FFF4E6;
    --brand-soft:  #FEF8F0;

    --ink:         #0F172A;
    --ink-2:       #334155;
    --muted:       #64748B;
    --muted-2:     #94A3B8;

    --line:        #E5E7EB;
    --line-soft:   #F1F5F9;

    --surface:     #FFFFFF;
    --canvas:      #FAFAF7;

    --pos:         #15803D;
    --pos-tint:    #DCFCE7;

    --shadow-sm:   0 1px 2px rgba(15, 23, 42, .04);
    --shadow-md:   0 1px 3px rgba(15, 23, 42, .06), 0 4px 12px rgba(15, 23, 42, .04);

    --radius-sm:   8px;
    --radius-md:   12px;
    --radius-lg:   16px;

    --font-display: "Geist", system-ui, -apple-system, sans-serif;
    --font-body:    "Geist", system-ui, -apple-system, sans-serif;
    --font-mono:    "Geist Mono", ui-monospace, "SF Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--canvas);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
  }

  /* ----- Layout shell --------------------------------------------------- */

  header.topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    backdrop-filter: saturate(180%) blur(8px);
  }
  .topbar-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 18px 32px;
    display: flex; align-items: center; gap: 20px;
  }
  .brand-mark {
    display: flex; align-items: center; gap: 14px;
    text-decoration: none; color: inherit;
  }
  .brand-mark img {
    width: 44px; height: 44px; display: block;
  }
  .brand-mark .titles { display: flex; flex-direction: column; line-height: 1.1; }
  .brand-mark .name {
    font-family: var(--font-display);
    font-weight: 600; font-size: 17px;
    color: var(--ink);
    letter-spacing: -0.015em;
  }
  .brand-mark .product {
    font-family: var(--font-body);
    font-weight: 500; font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 3px;
  }
  .topbar-spacer { flex: 1; }

  .btn-primary {
    font-family: var(--font-body);
    font-weight: 600; font-size: 14px;
    background: var(--brand); color: #FFFFFF;
    border: 1px solid var(--brand);
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background .15s ease, border-color .15s ease, transform .05s ease;
    box-shadow: var(--shadow-sm);
  }
  .btn-primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:focus-visible { outline: 3px solid rgba(245,137,33,.30); outline-offset: 1px; }

  .btn-ghost {
    font-family: var(--font-body);
    font-weight: 500; font-size: 13px;
    background: transparent;
    color: var(--ink-2);
    border: 1px dashed var(--line);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    cursor: pointer;
    width: 100%;
    transition: border-color .15s, color .15s, background .15s;
  }
  .btn-ghost:hover { border-color: var(--brand); color: var(--brand-dark); background: var(--brand-soft); }

  .btn-icon {
    background: transparent; border: 1px solid transparent;
    border-radius: 6px;
    padding: 5px 6px;
    color: var(--muted);
    cursor: pointer;
    line-height: 0;
    transition: color .15s, background .15s, border-color .15s;
  }
  .btn-icon:hover { color: #B91C1C; background: #FEF2F2; border-color: #FEE2E2; }
  .btn-icon svg { width: 15px; height: 15px; }

  /* ----- Page grid ------------------------------------------------------ */

  .page {
    max-width: 1400px; margin: 0 auto;
    padding: 32px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 32px;
    align-items: start;
  }
  @media (max-width: 980px) {
    .page { grid-template-columns: 1fr; padding: 20px; gap: 20px; }
    .topbar-inner { padding: 14px 20px; }
  }

  /* ----- Panels --------------------------------------------------------- */

  .panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
  }
  .panel-header {
    padding: 18px 22px 12px;
    border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .panel-title {
    font-family: var(--font-display);
    font-size: 16px; font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.015em;
  }
  .panel-subtitle {
    font-size: 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
  }
  .panel-body { padding: 18px 22px 22px; }

  /* Eyebrow section heading inside results column */
  .eyebrow {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--brand-dark);
    margin: 0 0 14px;
  }

  /* ----- Sidebar: per-loan card ---------------------------------------- */

  .loan-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    padding: 18px 18px 6px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .loan-card-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .loan-pip {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .loan-name-input {
    flex: 1;
    font-family: var(--font-display);
    font-size: 15px; font-weight: 600; color: var(--ink);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 4px 8px; margin-left: -8px;
    transition: background .15s, border-color .15s;
    width: 100%;
    letter-spacing: -0.015em;
  }
  .loan-name-input:hover { background: var(--line-soft); }
  .loan-name-input:focus { outline: none; background: var(--brand-soft); border-color: var(--brand); }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 14px;
    margin-bottom: 6px;
  }
  .field-grid .full { grid-column: 1 / -1; }

  .field label {
    display: block;
    font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .input, select.input {
    width: 100%;
    font-family: var(--font-body);
    font-size: 14px; font-weight: 500;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 9px 11px;
    transition: border-color .15s, box-shadow .15s;
  }
  select.input { font-family: var(--font-body); font-weight: 500; }
  .input:hover { border-color: #CBD5E1; }
  .input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(245,137,33,.15); }
  .input::placeholder { color: var(--muted-2); }

  .field-with-suffix { position: relative; }
  .field-with-suffix .input { padding-right: 36px; }
  .field-with-suffix .suffix {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-family: var(--font-body);
    font-size: 12px; font-weight: 500;
    color: var(--muted);
    pointer-events: none;
  }
  .field-with-prefix { position: relative; }
  .field-with-prefix .input { padding-left: 26px; }
  .field-with-prefix .prefix {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-family: var(--font-body);
    font-size: 13px; font-weight: 500;
    color: var(--muted);
    pointer-events: none;
  }

  .loan-card-footer {
    margin-top: 4px;
    padding-top: 12px;
    border-top: 1px solid var(--line-soft);
    display: flex; justify-content: flex-end;
  }

  /* ----- KPI cards (single-loan view) ---------------------------------- */

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  @media (max-width: 1180px) { .kpi-row { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); } }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .kpi::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--brand);
    opacity: 0; transition: opacity .2s;
  }
  .kpi.accent::before { opacity: 1; }
  .kpi .label {
    font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .kpi .value {
    font-family: var(--font-display);
    font-size: 24px; font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.025em;
    font-feature-settings: "tnum";
    line-height: 1.1;
  }
  .kpi .value.brand { color: var(--brand-dark); }
  .kpi .hint {
    font-size: 12px; color: var(--muted);
    margin-top: 6px; font-weight: 500;
  }

  /* ----- Comparison table ---------------------------------------------- */

  .ctable-wrap {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .ctable {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
  }
  .ctable th, .ctable td {
    padding: 14px 18px;
    text-align: right;
    font-size: 14px;
    border-bottom: 1px solid var(--line-soft);
  }
  .ctable th:first-child, .ctable td:first-child {
    text-align: left;
    font-weight: 500;
    color: var(--ink-2);
  }
  .ctable thead th {
    font-family: var(--font-body);
    font-weight: 600; font-size: 12px;
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    background: var(--canvas);
    padding-top: 12px; padding-bottom: 12px;
  }
  .ctable thead th:not(:first-child) { text-align: right; }
  .ctable tbody td { color: var(--ink); font-family: var(--font-body); font-weight: 500; }
  .ctable tbody td:first-child { font-family: var(--font-body); }
  .ctable tbody tr:last-child td { border-bottom: none; }
  .ctable tbody tr.total-row td {
    background: var(--brand-soft);
    border-top: 1px solid var(--brand);
    font-weight: 600;
    color: var(--ink);
  }
  .ctable tbody tr.total-row td:first-child {
    color: var(--brand-dark);
  }
  .ctable .total-col {
    background: var(--brand-tint) !important;
    font-weight: 600;
  }
  .ctable thead th.total-col { color: var(--brand-dark); background: var(--brand-tint) !important; }
  .ctable .dash { color: var(--muted-2); }

  /* ----- Chart container ------------------------------------------------ */

  .chart-panel { margin-bottom: 24px; }
  .chart-host { padding: 8px 22px 22px; }
  .chart-wrap { position: relative; height: 320px; }

  /* ----- Loan focus tabs (top of results column, multi-loan only) ------ */

  .focus-tabs-wrap {
    margin-bottom: 18px;
  }
  .focus-tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .focus-tabs::-webkit-scrollbar { display: none; }
  .focus-tab {
    padding: 11px 18px;
    font-family: var(--font-body);
    font-size: 13px; font-weight: 500;
    color: var(--muted);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
    margin-bottom: -1px;
  }
  .focus-tab:hover { color: var(--ink); }
  .focus-tab.active {
    color: var(--ink);
    border-bottom-color: var(--brand);
    font-weight: 600;
  }
  .focus-tab .tab-pip {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }

  /* ----- Schedule panel (per-loan amortisation table) ------------------- */

  .schedule-panel { margin-bottom: 24px; }

  .schedule-host {
    max-height: 460px;
    overflow: auto;
  }
  .schedule-table {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }
  .schedule-table thead {
    position: sticky; top: 0; z-index: 2;
    background: var(--surface);
    box-shadow: 0 1px 0 var(--line);
  }
  .schedule-table th {
    padding: 11px 18px;
    text-align: right;
    font-family: var(--font-body);
    font-weight: 600; font-size: 11px;
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    background: var(--surface);
  }
  .schedule-table th:nth-child(1) { text-align: center; width: 56px; }
  .schedule-table th:nth-child(2) { text-align: left; }
  .schedule-table td {
    padding: 10px 18px;
    text-align: right;
    color: var(--ink);
    font-family: var(--font-body);
    font-weight: 500;
    border-top: 1px solid var(--line-soft);
  }
  .schedule-table td:nth-child(1) {
    font-family: var(--font-body);
    color: var(--muted);
    text-align: center;
    font-weight: 500;
  }
  .schedule-table td:nth-child(2) {
    font-family: var(--font-body);
    text-align: left;
    color: var(--ink-2);
    font-weight: 500;
  }
  .schedule-table tr.io-period td:not(:nth-child(2)):not(:nth-child(1)):not(:nth-child(3)):not(:nth-child(4)) {
    color: var(--muted-2);
  }
  .schedule-table tr.io-period td:nth-child(2) {
    color: var(--brand-dark);
  }
  .schedule-table tbody tr:hover td { background: var(--brand-soft); }

  /* ----- Empty / placeholder ------------------------------------------- */

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 32px; margin-bottom: 12px; opacity: .4; }

  /* ----- Footer --------------------------------------------------------- */

  footer.pageftr {
    max-width: 1400px; margin: 24px auto 0;
    padding: 24px 32px 40px;
    color: var(--muted-2);
    font-size: 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--line-soft);
  }
  footer.pageftr a { color: inherit; text-decoration: none; }
  footer.pageftr a:hover { color: var(--brand-dark); }

  /* ----- Misc ----------------------------------------------------------- */

  .legend-line {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-2);
    margin-right: 16px;
  }
  .legend-line .sw {
    width: 14px; height: 3px; border-radius: 2px;
  }

  /* hide arrows on number inputs - cleaner look */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  /* page-load reveal */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reveal { animation: fadeUp .4s ease both; }
  .reveal-1 { animation-delay: .04s; }
  .reveal-2 { animation-delay: .08s; }
  .reveal-3 { animation-delay: .12s; }
</style>
</head>

  "#10B981", "#0EA5E9", "#EF4444", "#F59E0B",
];

/* ---------- Frequency definitions ---------- */

const FREQUENCIES = {
  Weekly:      { periodsPerYear: 52, stepDays: 7 },
  Fortnightly: { periodsPerYear: 26, stepDays: 14 },
  Monthly:     { periodsPerYear: 12, stepMonths: 1 },
  Quarterly:   { periodsPerYear: 4,  stepMonths: 3 },
  Annually:    { periodsPerYear: 1,  stepMonths: 12 },
};

/* ---------- Date helpers ---------- */

function parseDate(iso) {
  // expects "YYYY-MM-DD" - construct in local time to avoid TZ shifts
  const [y, m, d] = iso.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function fmtDateISO(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}
function fmtDateDisplay(date) {
  return date.toLocaleDateString("en-AU", { day: "2-digit", month: "short", year: "numeric" });
}
function advanceDate(date, frequency) {
  const f = FREQUENCIES[frequency];
  const out = new Date(date);
  if (f.stepDays) out.setDate(out.getDate() + f.stepDays);
  else out.setMonth(out.getMonth() + f.stepMonths);
  return out;
}

/* ---------- Number formatting ---------- */

const FMT_MONEY  = new Intl.NumberFormat("en-AU", { style: "currency", currency: "AUD", minimumFractionDigits: 2, maximumFractionDigits: 2 });
const FMT_MONEY0 = new Intl.NumberFormat("en-AU", { style: "currency", currency: "AUD", maximumFractionDigits: 0 });
const FMT_PCT    = (x) => `${(x * 100).toFixed(2)}%`;
const money  = (x) => FMT_MONEY.format(x).replace("A$", "$");
const money0 = (x) => FMT_MONEY0.format(x).replace("A$", "$");

/* ========================================================================== */
/*  LOAN ENGINE — straight port of loan_engine.py                              */
/* ========================================================================== */

function periodicRate(loan)   { return loan.annualRate / FREQUENCIES[loan.frequency].periodsPerYear; }
function totalPeriods(loan)   { return Math.round(loan.termYears * FREQUENCIES[loan.frequency].periodsPerYear); }
function ioPeriods(loan)      { return Math.round(loan.ioYears   * FREQUENCIES[loan.frequency].periodsPerYear); }
function piPeriods(loan)      { return totalPeriods(loan) - ioPeriods(loan); }

function scheduledPayment(loan) {
  const i = periodicRate(loan);
  const n = piPeriods(loan);
  if (n <= 0) return 0;
  if (i === 0) return loan.principal / n;
  return (loan.principal * i) / (1 - Math.pow(1 + i, -n));
}

function buildSchedule(loan) {
  const i = periodicRate(loan);
  const pmt = scheduledPayment(loan);
  const ioN = ioPeriods(loan);
  const totalN = totalPeriods(loan);

  let balance = loan.principal;
  let totalInterest = 0;
  let totalPaid = 0;
  let payDate = parseDate(loan.startDate);
  const schedule = [];

  for (let n = 1; n <= totalN; n++) {
    payDate = advanceDate(payDate, loan.frequency);
    const interest = balance * i;
    let payment, principal, extra;

    if (n <= ioN) {
      payment = interest;
      principal = 0;
      extra = 0;
    } else {
      payment = pmt;
      extra = loan.extraPayment || 0;
      principal = payment - interest + extra;
      // Don't overpay in the final period
      if (principal > balance) {
        principal = balance;
        payment = principal + interest - extra;
        if (payment < 0) { extra = balance + interest; payment = 0; }
      }
    }

    balance -= principal;
    if (balance < 1e-6) balance = 0;

    totalInterest += interest;
    totalPaid += payment + extra;

    schedule.push({ n, payDate: new Date(payDate), payment, interest, principal, extra, closingBalance: balance });
    if (balance === 0) break;
  }

  const finishDate = schedule.length ? schedule[schedule.length - 1].payDate : parseDate(loan.startDate);

  return {
    loan,
    schedule,
    scheduledPayment: pmt,
    ioPayment: loan.principal * periodicRate(loan),
    totalInterest,
    totalPaid,
    totalCost: loan.principal + totalInterest,
    finishDate,
    actualPeriods: schedule.length,
  };
}

const X = {
  font:       { name: "Calibri", size: 11 },
  brand:      "FFF58921",
  brandTint:  "FFFFF4E6",
  bandFill:   "FFFFF4E6",
  inputFill:  "FFFFF8E1",
  posFill:    "FFC8E6C9",
  ink:        "FF1A1A2E",
  white:      "FFFFFFFF",
  thin:       { style: "thin", color: { argb: "FFD5DCE4" } },
};
const xBorder = () => ({ top: X.thin, left: X.thin, bottom: X.thin, right: X.thin });
const xLabel  = (cell, opts = {}) => {
  cell.font = { name: X.font.name, size: opts.size || 11, bold: opts.bold ?? true, color: { argb: opts.color || X.brand } };
};
const xHeader = (cell) => {
  cell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.brand } };
  cell.font = { name: X.font.name, size: 11, bold: true, color: { argb: X.white } };
  cell.alignment = { horizontal: "center", vertical: "center" };
  cell.border = xBorder();
};

async function exportWorkbook(results) {
  const wb = new ExcelJS.Workbook();
  wb.creator = "Plus 1 Group · Loan Planner";
  wb.created = new Date();

  if (results.length > 1) writeComparisonSheet(wb, results);
  for (const r of results) writeLoanSheet(wb, r);

  const buffer = await wb.xlsx.writeBuffer();
  return new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
}

function writeComparisonSheet(wb, results) {
  const ws = wb.addWorksheet("Comparison", { properties: { defaultRowHeight: 18 }, views: [{ showGridLines: false }] });

  ws.getCell("B2").value = "Loan Comparison";
  ws.getCell("B2").font = { name: X.font.name, bold: true, size: 18, color: { argb: X.brand } };

  const metrics = [
    { label: "Loan amount",             get: r => r.loan.principal,        fmt: '"$"#,##0',   summable: true  },
    { label: "Annual interest rate",    get: r => r.loan.annualRate,       fmt: "0.00%",      summable: false },
    { label: "Frequency",               get: r => r.loan.frequency,        fmt: null,         summable: false },
    { label: "Term (years)",            get: r => r.loan.termYears,        fmt: "0.##",       summable: false },
    { label: "Interest-only (years)",   get: r => r.loan.ioYears,          fmt: "0.##",       summable: false },
    { label: "Scheduled payment (P&I)", get: r => r.scheduledPayment,      fmt: '"$"#,##0.00',summable: true  },
    { label: "Interest-only payment",   get: r => r.ioPayment,             fmt: '"$"#,##0.00',summable: true  },
    { label: "Number of payments",      get: r => r.actualPeriods,         fmt: "0",          summable: false },
    { label: "Total interest payable",  get: r => r.totalInterest,         fmt: '"$"#,##0.00',summable: true  },
    { label: "Total cost of loan",      get: r => r.totalCost,             fmt: '"$"#,##0.00',summable: true  },
  ];

  const totalColIdx = 3 + results.length;
  const hrow = 4;

  // Header row
  const hMetric = ws.getCell(hrow, 2); hMetric.value = "Metric"; xHeader(hMetric); hMetric.alignment = { horizontal: "left" };
  results.forEach((r, j) => { const c = ws.getCell(hrow, 3 + j); c.value = r.loan.name; xHeader(c); });
  const ht = ws.getCell(hrow, totalColIdx); ht.value = "Total"; xHeader(ht);

  // Body rows
  metrics.forEach((m, i) => {
    const row = hrow + 1 + i;
    const lc = ws.getCell(row, 2); lc.value = m.label;
    xLabel(lc); lc.border = xBorder();
    if (i % 2) lc.fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.bandFill } };

    results.forEach((r, j) => {
      const c = ws.getCell(row, 3 + j);
      c.value = m.get(r);
      if (m.fmt) c.numFmt = m.fmt;
      c.font = { name: X.font.name, size: 11, bold: m.label.startsWith("Total"), color: { argb: X.ink } };
      c.alignment = { horizontal: "center" };
      c.border = xBorder();
      if (i % 2) c.fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.bandFill } };
    });

    const tcell = ws.getCell(row, totalColIdx);
    if (m.summable) {
      tcell.value = results.reduce((sum, r) => sum + Number(m.get(r) || 0), 0);
      if (m.fmt) tcell.numFmt = m.fmt;
    } else {
      tcell.value = "—";
    }
    tcell.font = { name: X.font.name, size: 11, bold: true, color: { argb: X.ink } };
    tcell.alignment = { horizontal: "center" };
    tcell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.brandTint } };
    tcell.border = xBorder();
  });

  ws.getColumn(1).width = 2;
  ws.getColumn(2).width = 28;
  for (let j = 0; j < results.length; j++) ws.getColumn(3 + j).width = 18;
  ws.getColumn(totalColIdx).width = 20;
}

function writeLoanSheet(wb, res) {
  const loan = res.loan;
  const ws = wb.addWorksheet(loan.name.slice(0, 31) || "Loan", { views: [{ showGridLines: false }] });

  // ---- Title ----
  ws.getCell("B2").value = `${loan.name} — Loan Summary`;
  ws.getCell("B2").font = { name: X.font.name, bold: true, size: 18, color: { argb: X.brand } };

  // ---- Inputs block (cols B-C) ----
  const inputs = [
    { label: "Loan amount",                val: loan.principal,             fmt: '"$"#,##0',     isInput: true },
    { label: "Annual interest rate",       val: loan.annualRate,            fmt: "0.00%",        isInput: true },
    { label: "Payment frequency",          val: loan.frequency,             fmt: null,           isInput: true },
    { label: "Total term (years)",         val: loan.termYears,             fmt: "0.##",         isInput: true },
    { label: "Interest-only period (years)", val: loan.ioYears,             fmt: "0.##",         isInput: true },
    { label: "Extra payment per period",   val: loan.extraPayment || 0,     fmt: '"$"#,##0',     isInput: true },
    { label: "Start date",                 val: parseDate(loan.startDate),  fmt: "dd mmm yyyy",  isInput: true },
  ];

  let r = 4;
  const inRows = {};
  inputs.forEach(it => {
    const lc = ws.getCell(r, 2); lc.value = it.label;
    lc.font = { name: X.font.name, bold: true, size: 11, color: { argb: X.ink } };
    lc.border = xBorder();
    const vc = ws.getCell(r, 3);
    vc.value = it.val;
    if (it.fmt) vc.numFmt = it.fmt;
    vc.font = { name: X.font.name, size: 11, color: { argb: it.isInput ? "FF0000FF" : X.ink } };
    vc.alignment = { horizontal: "right" };
    if (it.isInput) vc.fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.inputFill } };
    vc.border = xBorder();
    inRows[it.label] = r;
    r++;
  });

  // Derived periodic rate
  const rateRow = inRows["Annual interest rate"];
  const ppy = FREQUENCIES[loan.frequency].periodsPerYear;
  ws.getCell(r, 2).value = "Periodic rate (auto)";
  xLabel(ws.getCell(r, 2));
  ws.getCell(r, 2).border = xBorder();
  const pr = ws.getCell(r, 3);
  pr.value = { formula: `C${rateRow}/${ppy}` };
  pr.numFmt = "0.0000%";
  pr.alignment = { horizontal: "right" };
  pr.border = xBorder();
  const periodicRow = r;
  r++;

  // Summary block
  const summary = [
    { label: "Scheduled payment (P&I)", val: res.scheduledPayment, fmt: '"$"#,##0.00' },
    { label: "Interest-only payment",   val: res.ioPayment,        fmt: '"$"#,##0.00' },
    { label: "Number of payments",      val: res.actualPeriods,    fmt: "0" },
    { label: "Finish date",             val: res.finishDate,       fmt: "dd mmm yyyy" },
    { label: "Total interest payable",  val: res.totalInterest,    fmt: '"$"#,##0.00' },
    { label: "Total cost of loan",      val: res.totalCost,        fmt: '"$"#,##0.00' },
  ];
  r++;
  summary.forEach(it => {
    const lc = ws.getCell(r, 2); lc.value = it.label; xLabel(lc); lc.border = xBorder();
    const vc = ws.getCell(r, 3); vc.value = it.val;
    vc.numFmt = it.fmt;
    vc.font = { name: X.font.name, size: 11, bold: it.label.startsWith("Total"), color: { argb: X.ink } };
    vc.alignment = { horizontal: "right" };
    vc.border = xBorder();
    if (it.label.startsWith("Total")) {
      lc.fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.bandFill } };
      vc.fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.bandFill } };
    }
    r++;
  });

  // ---- Schedule (cols E-K) ----
  const headers = ["No.", "Date", "Payment", "Interest", "Principal", "Extra", "Closing balance"];
  const hrow = 4;
  const startCol = 5; // E
  headers.forEach((h, j) => {
    const c = ws.getCell(hrow, startCol + j); c.value = h; xHeader(c);
  });

  const cE = "E", cF = "F", cG = "G", cH = "H", cI = "I", cJ = "J", cK = "K";
  const prRef = `$C$${periodicRow}`;
  const ioRef = `$C$${inRows["Interest-only period (years)"]}`;
  const extraRef = `$C$${inRows["Extra payment per period"]}`;
  const schedPmt = res.scheduledPayment;          // full precision - displayed format rounds

  const first = hrow + 1;
  const nRows = res.actualPeriods;

  for (let k = 0; k < nRows; k++) {
    const row = first + k;
    const prevBal = k === 0 ? `$C$${inRows["Loan amount"]}` : `${cK}${row - 1}`;
    const prevDate = k === 0 ? `$C$${inRows["Start date"]}` : `${cF}${row - 1}`;

    ws.getCell(row, 5).value = k + 1;
    ws.getCell(row, 5).alignment = { horizontal: "center" };

    // Date advance formula by frequency
    let dateFormula;
    if (loan.frequency === "Monthly")     dateFormula = `EDATE(${prevDate},1)`;
    else if (loan.frequency === "Quarterly") dateFormula = `EDATE(${prevDate},3)`;
    else if (loan.frequency === "Annually")  dateFormula = `EDATE(${prevDate},12)`;
    else if (loan.frequency === "Fortnightly") dateFormula = `${prevDate}+14`;
    else dateFormula = `${prevDate}+7`;
    ws.getCell(row, 6).value = { formula: dateFormula };
    ws.getCell(row, 6).numFmt = "dd mmm yyyy";

    ws.getCell(row, 8).value = { formula: `${prevBal}*${prRef}` };          // H Interest
    const ioTest = `(${k + 1}<=${ioRef}*${FREQUENCIES[loan.frequency].periodsPerYear})`;
    ws.getCell(row, 7).value = { formula: `IF(${ioTest},${cH}${row},MIN(${schedPmt},${prevBal}+${cH}${row}))` }; // G Payment
    ws.getCell(row,10).value = { formula: `IF(${ioTest},0,MIN(${extraRef},MAX(0,${prevBal}+${cH}${row}-${cG}${row})))` }; // J Extra
    ws.getCell(row, 9).value = { formula: `MAX(0,${cG}${row}-${cH}${row}+${cJ}${row})` }; // I Principal
    ws.getCell(row,11).value = { formula: `MAX(0,${prevBal}-${cI}${row})` }; // K Closing

    [cG, cH, cI, cJ, cK].forEach(col => {
      const cell = ws.getCell(`${col}${row}`);
      cell.numFmt = '"$"#,##0.00';
      cell.alignment = { horizontal: "right" };
    });
    [cE, cF, cG, cH, cI, cJ, cK].forEach(col => {
      const cell = ws.getCell(`${col}${row}`);
      cell.font = { name: X.font.name, size: 10, color: { argb: X.ink } };
      cell.border = xBorder();
      if (k % 2) cell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.bandFill } };
    });
  }

  // Totals row
  const tot = first + nRows;
  ws.getCell(tot, 6).value = "Totals";
  ws.getCell(tot, 6).font = { name: X.font.name, bold: true, color: { argb: X.brand } };
  ws.getCell(tot, 6).fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.bandFill } };
  ws.getCell(tot, 6).border = xBorder();
  [cG, cH, cI, cJ].forEach(col => {
    const c = ws.getCell(`${col}${tot}`);
    c.value = { formula: `SUM(${col}${first}:${col}${tot - 1})` };
    c.numFmt = '"$"#,##0.00';
    c.font = { name: X.font.name, bold: true, color: { argb: X.ink } };
    c.fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.bandFill } };
    c.alignment = { horizontal: "right" };
    c.border = xBorder();
  });
  ws.getCell(`${cK}${tot}`).fill = { type: "pattern", pattern: "solid", fgColor: { argb: X.bandFill } };
  ws.getCell(`${cK}${tot}`).border = xBorder();

  // Column widths
  ws.getColumn(1).width = 2;
  ws.getColumn(2).width = 32;
  ws.getColumn(3).width = 18;
  ws.getColumn(4).width = 3;
  ws.getColumn(5).width = 6;
  ws.getColumn(6).width = 14;
  [7, 8, 9, 10, 11].forEach(i => ws.getColumn(i).width = 14);
}

function uid() { return "L" + Math.random().toString(36).slice(2, 8); }

function defaultLoan(seed) {
  return {
    id: uid(),
    name: seed ? `Loan ${seed}` : "Loan A",
    principal: 700_000,
    annualRate: 0.065,
    termYears: 30,
    ioYears: 0,
    frequency: "Monthly",
    startDate: fmtDateISO(new Date()),
    extraPayment: 0,
  };
}

const state = {
  loans: [defaultLoan(null)],
  selectedScheduleId: null,   // which loan's schedule to show; null = first
};

let chartInstance = null;

function recompute() {
  return state.loans.map(buildSchedule);
}

function activeScheduleResult(results) {
  if (!results.length) return null;
  const found = results.find(r => r.loan.id === state.selectedScheduleId);
  return found || results[0];
}

/* ----- DOM helpers ----- */

const $  = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === "class") node.className = v;
    else if (k === "html") node.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k in node && typeof v !== "string") node[k] = v;
    else node.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return node;
}

/* ----- Render: inputs column ----- */

function renderInputsCol() {

}

function renderLoanCard(loan, idx) {
  const colour = CHART_PALETTE[idx % CHART_PALETTE.length];

  const update = (patch) => {
    Object.assign(loan, patch);
    renderResultsCol(); // only the results need re-rendering, inputs stay put
  };

  const numInput = (key, opts = {}) => {
    const input = el("input", {
      class: "input",
      type: "number",
      inputmode: "decimal",
      step: opts.step ?? "any",
      min: opts.min ?? "0",
      value: opts.transform ? opts.transform(loan[key]) : loan[key],
    });
    input.addEventListener("input", (e) => {
      const raw = e.target.value;
      const num = raw === "" ? 0 : Number(raw);
      if (Number.isFinite(num)) update({ [key]: opts.inverse ? opts.inverse(num) : num });
    });
    return input;
  };

  return el("div", { class: "loan-card" },
    el("div", { class: "loan-card-header" },
      el("span", { class: "loan-pip", style: `background:${colour}` }),
      el("input", {
        class: "loan-name-input",
        value: loan.name,
        spellcheck: "false",
        onInput: (e) => update({ name: e.target.value }),
      }),
    ),
    el("div", { class: "field-grid" },
      el("div", { class: "field full" },
        el("label", {}, "Loan amount"),
        el("div", { class: "field-with-prefix" },
          el("span", { class: "prefix" }, "$"),
          numInput("principal", { step: "1000" }),
        ),
      ),
      el("div", { class: "field" },
        el("label", {}, "Interest rate"),
        el("div", { class: "field-with-suffix" },
          numInput("annualRate", {
            step: "0.01",
            transform: (x) => (x * 100).toFixed(2),
            inverse: (x) => x / 100,
          }),
          el("span", { class: "suffix" }, "%"),
        ),
      ),
      el("div", { class: "field" },
        el("label", {}, "Frequency"),
        (() => {
          const sel = el("select", { class: "input" });
          Object.keys(FREQUENCIES).forEach(f => {
            const opt = el("option", { value: f }, f);
            if (f === loan.frequency) opt.selected = true;
            sel.appendChild(opt);
          });
          sel.addEventListener("change", (e) => update({ frequency: e.target.value }));
          return sel;
        })(),
      ),
      el("div", { class: "field" },
        el("label", {}, "Term"),
        el("div", { class: "field-with-suffix" },
          numInput("termYears", { step: "1" }),
          el("span", { class: "suffix" }, "yr"),
        ),
      ),
      el("div", { class: "field" },
        el("label", {}, "Interest-only"),
        el("div", { class: "field-with-suffix" },
          numInput("ioYears", { step: "1" }),
          el("span", { class: "suffix" }, "yr"),
        ),
      ),
      el("div", { class: "field" },
        el("label", {}, "Start date"),
        (() => {
          const inp = el("input", { class: "input", type: "date", value: loan.startDate });
          inp.addEventListener("input", (e) => update({ startDate: e.target.value }));
          return inp;
        })(),
      ),
      el("div", { class: "field" },
        el("label", {}, "Extra / period"),
        el("div", { class: "field-with-prefix" },
          el("span", { class: "prefix" }, "$"),
          numInput("extraPayment", { step: "50" }),
        ),
      ),
    ),
    state.loans.length > 1
      ? el("div", { class: "loan-card-footer" },
          el("button", {
            class: "btn-icon",
            title: "Remove this loan",
            onClick: () => {
              state.loans = state.loans.filter(l => l.id !== loan.id);
              renderAll();
            },
          },
            el("span", { html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>' }),
          )
        )
      : null,
  );
}

/* ----- Render: results column ----- */

function renderResultsCol() {
  const col = $("#resultsCol");
  col.innerHTML = "";

  const results = recompute();
  if (results.length === 0) return;

  const active = activeScheduleResult(results);

  // 1. Side-by-side comparison table (multi-loan only)
  if (results.length > 1) {
    col.appendChild(renderComparisonTable(results));
  }

  // 2. Outstanding balance chart (all loans overlaid)
  col.appendChild(renderBalanceChartPanel(results));

  // 3. Tabs (multi-loan only) - introduce the focused-loan section below
  if (results.length > 1) {
    col.appendChild(renderFocusTabs(results, active));
  }

  // 4. KPI cards for the focused loan
  col.appendChild(renderKPIs(active));

  // 5. Amortisation schedule for the focused loan
  col.appendChild(renderSchedulePanel(active));

  requestAnimationFrame(() => drawChart(results));
}

function renderFocusTabs(results, active) {
  const wrap = el("div", { class: "focus-tabs-wrap" });
  const tabs = el("div", { class: "focus-tabs", role: "tablist" });
  results.forEach((r, i) => {
    const isActive = r.loan.id === active.loan.id;
    const colour = CHART_PALETTE[i % CHART_PALETTE.length];
    tabs.appendChild(
      el("button", {
        class: "focus-tab" + (isActive ? " active" : ""),
        type: "button",
        role: "tab",
        "aria-selected": String(isActive),
        onClick: () => {
          state.selectedScheduleId = r.loan.id;
          renderResultsCol();
        },
      },
        el("span", { class: "tab-pip", style: `background:${colour}` }),
        r.loan.name,
      )
    );
  });
  wrap.appendChild(tabs);
  return wrap;
}

function renderKPIs(res) {
  const wrap = el("div", {});
  // Only show the eyebrow when there's no tab strip above us
  if (state.loans.length === 1) {
    wrap.appendChild(el("div", { class: "eyebrow" }, "Loan summary"));
  }

  const ioN = ioPeriods(res.loan);
  // The IO window ends on the date of the final IO payment - i.e. the
  // pay_date of period number `ioN` in the schedule.
  const ioEndDate = ioN > 0 && res.schedule[ioN - 1]
    ? res.schedule[ioN - 1].payDate
    : null;

  const cards = [
    el("div", { class: "kpi accent" },
      el("div", { class: "label" }, "Scheduled payment"),
      el("div", { class: "value brand" }, money(res.scheduledPayment)),
      el("div", { class: "hint" }, res.loan.frequency.toLowerCase()),
    ),
    el("div", { class: "kpi" },
      el("div", { class: "label" }, "Total interest"),
      el("div", { class: "value" }, money0(res.totalInterest)),
      el("div", { class: "hint" }, `${FMT_PCT(res.loan.annualRate)} p.a.`),
    ),
    el("div", { class: "kpi" },
      el("div", { class: "label" }, "Total cost"),
      el("div", { class: "value" }, money0(res.totalCost)),
      el("div", { class: "hint" }, "Principal + interest"),
    ),
    el("div", { class: "kpi" },
      el("div", { class: "label" }, "Payments"),
      el("div", { class: "value" }, String(res.actualPeriods)),
      el("div", { class: "hint" }, `Finishes ${fmtDateDisplay(res.finishDate)}`),
    ),
  ];

  // Conditional: interest-only summary card (only when IO > 0)
  if (ioN > 0 && ioEndDate) {
    cards.push(
      el("div", { class: "kpi" },
        el("div", { class: "label" }, "Interest-only periods"),
        el("div", { class: "value" }, String(ioN)),
        el("div", { class: "hint" }, `Ends ${fmtDateDisplay(ioEndDate)}`),
      )
    );
  }

  wrap.appendChild(el("div", { class: "kpi-row" }, ...cards));
  return wrap;
}

function renderComparisonTable(results) {
  const sum = (fn) => results.reduce((s, r) => s + fn(r), 0);

  const wrap = el("div", {});
  wrap.appendChild(el("div", { class: "eyebrow" }, "Side-by-side comparison"));

  const tableWrap = el("div", { class: "ctable-wrap" });
  const table = el("table", { class: "ctable" });

  // Header
  const thead = el("thead");
  const trh = el("tr");
  trh.appendChild(el("th", {}, ""));
  results.forEach((r, i) => {
    trh.appendChild(el("th", { style: `color:${CHART_PALETTE[i % CHART_PALETTE.length]}` }, r.loan.name));
  });
  trh.appendChild(el("th", { class: "total-col" }, "Total"));
  thead.appendChild(trh);
  table.appendChild(thead);

  // Body
  const tbody = el("tbody");
  const rows = [
    { label: "Loan amount",        cells: results.map(r => money0(r.loan.principal)),       total: money0(sum(r => r.loan.principal)) },
    { label: "Rate",               cells: results.map(r => FMT_PCT(r.loan.annualRate)),     total: "—" },
    { label: "Frequency",          cells: results.map(r => r.loan.frequency),               total: "—" },
    { label: "Scheduled payment",  cells: results.map(r => money(r.scheduledPayment)),      total: money(sum(r => r.scheduledPayment)) },
    { label: "Interest-only pmt",  cells: results.map(r => money(r.ioPayment)),             total: money(sum(r => r.ioPayment)) },
    { label: "Payments",           cells: results.map(r => String(r.actualPeriods)),        total: "—" },
    { label: "Total interest",     cells: results.map(r => money(r.totalInterest)),         total: money(sum(r => r.totalInterest)) },
    { label: "Total cost of loan", cells: results.map(r => money(r.totalCost)),             total: money(sum(r => r.totalCost)), isTotal: true },
  ];

  rows.forEach(row => {
    const tr = el("tr", { class: row.isTotal ? "total-row" : "" });
    tr.appendChild(el("td", {}, row.label));
    row.cells.forEach(c => {
      tr.appendChild(el("td", { class: c === "—" ? "dash" : "" }, c));
    });
    tr.appendChild(el("td", { class: "total-col" + (row.total === "—" ? " dash" : "") }, row.total));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  wrap.appendChild(tableWrap);

  return wrap;
}

function renderBalanceChartPanel(results) {
  return el("div", { class: "panel chart-panel" },
    el("div", { class: "panel-header" },
      el("div", { class: "panel-title" }, "Outstanding balance over time"),
      el("div", { class: "panel-subtitle" }, "by payment period"),
    ),
    el("div", { class: "chart-host" },
      el("div", { class: "chart-wrap" },
        el("canvas", { id: "balanceChart" }),
      ),
    ),
  );
}

/* ---- Schedule panel: scrollable amortisation table for the focused loan ---- */

function renderSchedulePanel(active) {
  if (!active) return document.createDocumentFragment();

  const panel = el("div", { class: "panel schedule-panel" });

  panel.appendChild(
    el("div", { class: "panel-header" },
      el("div", { class: "panel-title" }, "Amortisation schedule"),
      el("div", { class: "panel-subtitle" },
        `${active.actualPeriods} payments · finishes ${fmtDateDisplay(active.finishDate)}`,
      ),
    )
  );

  const host = el("div", { class: "schedule-host" });
  const table = el("table", { class: "schedule-table" });

  const thead = el("thead");
  const trh = el("tr");
  ["No.", "Date", "Payment", "Interest", "Principal", "Extra", "Closing balance"].forEach(h => {
    trh.appendChild(el("th", {}, h));
  });
  thead.appendChild(trh);
  table.appendChild(thead);

  const tbody = el("tbody");
  const ioN = ioPeriods(active.loan);
  active.schedule.forEach(p => {
    const isIO = p.n <= ioN;
    const tr = el("tr", { class: isIO ? "io-period" : "" });
    tr.appendChild(el("td", {}, String(p.n)));
    tr.appendChild(el("td", {}, fmtDateDisplay(p.payDate)));
    tr.appendChild(el("td", {}, money(p.payment)));
    tr.appendChild(el("td", {}, money(p.interest)));
    tr.appendChild(el("td", {}, money(p.principal)));
    tr.appendChild(el("td", {}, money(p.extra)));
    tr.appendChild(el("td", {}, money(p.closingBalance)));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  host.appendChild(table);
  panel.appendChild(host);

  return panel;
}

function drawChart(results) {
  const canvas = $("#balanceChart");
  if (!canvas) return;

  // Build aligned-x dataset: every loan plotted against its own period index
  const maxPeriods = Math.max(...results.map(r => r.actualPeriods));
  const labels = Array.from({ length: maxPeriods + 1 }, (_, i) => i);

  const datasets = results.map((r, i) => {
    const colour = CHART_PALETTE[i % CHART_PALETTE.length];
    const data = [r.loan.principal];
    r.schedule.forEach(p => data.push(p.closingBalance));
    // pad with nulls so the line ends cleanly at its own term
    while (data.length < labels.length) data.push(null);
    return {
      label: r.loan.name,
      data,
      borderColor: colour,
      backgroundColor: colour + "20",
      borderWidth: 2,
      tension: 0.18,
      pointRadius: 0,
      pointHoverRadius: 4,
      pointHoverBorderWidth: 2,
      spanGaps: false,
    };
  });

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(canvas, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: {
          position: "bottom",
          labels: {
            color: BRAND.navy,
            font: { family: "Geist", size: 12, weight: "500" },
            usePointStyle: true,
            pointStyle: "rectRounded",
            boxWidth: 10, boxHeight: 4,
            padding: 16,
          },
        },
        tooltip: {
          backgroundColor: "rgba(15,23,42,0.95)",
          titleFont: { family: "Geist", weight: "600", size: 12 },
          bodyFont: { family: "Geist Mono", size: 12 },
          padding: 12,
          cornerRadius: 8,
          displayColors: true,
          boxPadding: 4,
          callbacks: {
            title: (items) => items.length ? `Period ${items[0].label}` : "",
            label: (ctx) => `  ${ctx.dataset.label}: ${money0(ctx.parsed.y)}`,
          },
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            color: BRAND.slate,
            font: { family: "Geist Mono", size: 11 },
            maxRotation: 0,
            autoSkipPadding: 24,
          },
          title: {
            display: true, text: "Payment number",
            color: BRAND.slate,
            font: { family: "Geist", size: 11, weight: "500" },
          },
        },
        y: {
          grid: { color: "#F1F5F9" },
          border: { display: false },
          ticks: {
            color: BRAND.slate,
            font: { family: "Geist Mono", size: 11 },
            callback: (v) => v >= 1000 ? "$" + (v / 1000).toFixed(0) + "k" : "$" + v,
          },
        },
      },
    },
  });
}

/* ----- Full render ----- */

function renderAll() {
  renderInputsCol();
  renderResultsCol();
}

/* ----- Export wire-up ----- */

async function handleExport() {
  const btn = $("#exportBtn");
  const prevHTML = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = "Preparing…";
  try {
    const results = recompute();
    const blob = await exportWorkbook(results);
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "amortisation_schedule.xlsx";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  } catch (err) {
    console.error(err);
    alert("Export failed: " + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = prevHTML;
  }
}

/* ----- Boot ----- */

document.addEventListener("DOMContentLoaded", () => {
  $("#year").textContent = new Date().getFullYear();
  $("#exportBtn").addEventListener("click", handleExport);
  renderAll();
});

</script>
